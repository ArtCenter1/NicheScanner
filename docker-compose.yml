version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-niche_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-niche_scanner}
      POSTGRES_DB: ${POSTGRES_DB:-niche_scanner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-niche_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-niche_scanner}:${POSTGRES_PASSWORD:-niche_scanner}@postgres:5432/${POSTGRES_DB:-niche_scanner}
      HERMES_MOCK: ${HERMES_MOCK:-true}
      SANDBOX_MODE: ${SANDBOX_MODE:-true}
    volumes:
      - ./backend:/app
      - reports_data:/app/reports
    ports:
      - "8020:8011"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8011 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8020
    ports:
      - "3333:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  reports_data: